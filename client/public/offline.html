<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Hub Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.75rem, 4vw, 2.3rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        color: #475569;
        line-height: 1.6;
        margin: 0 0 20px;
      }

      button,
      a {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        border: 0;
        background: #2563eb;
        color: #fff;
        padding: 0 16px;
      }

      a {
        margin-left: 8px;
        border: 1px solid #cbd5e1;
        color: #0f172a;
        padding: 0 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>School Hub saved the app shell and your local work. Reconnect to sync saved actions with the server.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
      <a href="/">Open cached home</a>
    </main>
  </body>
</html>
